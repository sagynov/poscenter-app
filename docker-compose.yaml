version: '3.9'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        volumes:
            - /etc/localtime:/etc/localtime:ro
        command: php artisan serve --host=0.0.0.0 --port=8080
        networks:
            - coolify

networks:
    coolify:
        external: true
